name: R6800 Firmware Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install full dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libncurses5-dev gawk flex bison libssl-dev git unzip zip file wget curl

      - name: Clone rt-n56u & Download toolchain
        run: |
          git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u
          cd /opt/rt-n56u/toolchain-mipsel
          chmod +x dl_toolchain.sh
          for i in {1..3}; do ./dl_toolchain.sh && break; sleep 5; done

      - name: Create NETGEAR-BZV dir
        run: mkdir -p /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV

      - name: Write board.mk
        run: |
          echo "BOARD_NAME := NETGEAR-BZV" > /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.mk
          echo "CONFIG_MT7615_5G_ANT_TX=4" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.mk
          echo "CONFIG_MT7615_5G_ANT_RX=4" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.mk
          echo "CONFIG_MT7615_4X4=y" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.mk
          echo "CONFIG_MT7621_CPU_CLOCK=1000" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.mk

      - name: Write kernel config
        run: |
          echo "CONFIG_RAETH_ESW_PORT_WAN=4" > /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/kernel-3.4.x.config
          echo "CONFIG_RAETH_ESW_PORT_LAN1=3" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/kernel-3.4.x.config
          echo "CONFIG_RAETH_ESW_PORT_LAN2=2" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/kernel-3.4.x.config
          echo "CONFIG_RAETH_ESW_PORT_LAN3=1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/kernel-3.4.x.config
          echo "CONFIG_RAETH_ESW_PORT_LAN4=0" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/kernel-3.4.x.config

      - name: Write board.h
        run: |
          echo "/* NETGEAR-BZV (R6800) */" > /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_PID \"NETGEAR-BZV\"" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NAME \"NETGEAR-BZV\"" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_DESC \"NETGEAR R6800 Dual MT7615 Wireless Router\"" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_VENDOR_NAME \"NETGEAR Co., Ltd.\"" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_BOOT_TIME 20" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_FLASH_TIME 120" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_BTN_RESET 12" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_BTN_WPS 18" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_BTN_FN1 14" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_LED_WIFI 5" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_USB_PWR 11" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_POWER_LED 7" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_WAN_LED 6" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_LAN_LED 8" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_GPIO_RESET_ACTIVE_LOW 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_HAS_5G_11AC 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_HAS_2G_11N 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_ANT_5G_TX 4" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_ANT_5G_RX 4" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_ANT_2G_TX 4" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_ANT_2G_RX 4" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_ETH_LEDS 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_ETH_EPHY 5" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_HAS_EPHY_L1000 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_HAS_EPHY_W1000 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h
          echo "#define BOARD_NUM_UPHY_USB3 1" >> /opt/rt-n56u/trunk/configs/boards/NETGEAR-BZV/board.h

      - name: Create base .config (修正 NAND + 无线最优)
        run: |
          cd /opt/rt-n56u/trunk
          cp configs/templates/PSG1208.config .config
          sed -i 's/CONFIG_TARGET_BOARD=.*/CONFIG_TARGET_BOARD="NETGEAR-BZV"/' .config
          sed -i 's/CONFIG_FIRMWARE_NAND_FLASH=n/CONFIG_FIRMWARE_NAND_FLASH=y/' .config
          sed -i 's/CONFIG_FIRMWARE_FLASH_SIZE=.*/CONFIG_FIRMWARE_FLASH_SIZE=134217728/' .config
          sed -i 's/CONFIG_WIFI_REGION=.*/CONFIG_WIFI_REGION="CN"/' .config
          sed -i 's/CONFIG_5G_CHANNEL_WIDTH=.*/CONFIG_5G_CHANNEL_WIDTH=80/' .config
          sed -i 's/CONFIG_2G_CHANNEL_WIDTH=.*/CONFIG_2G_CHANNEL_WIDTH=40/' .config
          sed -i 's/CONFIG_WIFI_TX_POWER=.*/CONFIG_WIFI_TX_POWER=20/' .config
          sed -i 's/CONFIG_WIFI_AGGREGATION=n/CONFIG_WIFI_AGGREGATION=y/' .config
          sed -i 's/CONFIG_WIFI_AMSDU=n/CONFIG_WIFI_AMSDU=y/' .config

      - name: Build firmware (自动识别编译脚本)
        run: |
          cd /opt/rt-n56u/trunk
          ls -la
          # 尝试不同的编译脚本名
          if [ -f ./build.sh ]; then
            ./build.sh V=s
          elif [ -f ./make.sh ]; then
            ./make.sh V=s
          elif [ -f ./firmware.sh ]; then
            ./firmware.sh V=s
          else
            echo "未找到编译脚本，尝试 make menuconfig && make"
            make menuconfig -n
            make
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: R6800-firmware
          path: /opt/rt-n56u/trunk/images/*.trx
