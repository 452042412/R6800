name: R6800 Firmware Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk flex bison libssl-dev git unzip wget curl fakeroot

      - name: Clone source code
        run: |
          git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u

      - name: Download and link toolchain
        run: |
          cd /opt/rt-n56u
          wget -O toolchain-3.4.x.tar.bz2 https://github.com/hanwckf/rt-n56u/releases/download/toolchain/toolchain-3.4.x.tar.bz2
          tar -xf toolchain-3.4.x.tar.bz2
          rm -f toolchain-3.4.x.tar.bz2

      - name: Prepare board config
        run: |
          cd /opt/rt-n56u/trunk
          cp configs/templates/PSG1208.config .config
          sed -i 's/CONFIG_TARGET_BOARD=.*/CONFIG_TARGET_BOARD="NETGEAR-BZV"/' .config
          sed -i 's/CONFIG_FIRMWARE_NAND_FLASH=n/CONFIG_FIRMWARE_NAND_FLASH=y/' .config
          sed -i 's/CONFIG_FIRMWARE_FLASH_SIZE=.*/CONFIG_FIRMWARE_FLASH_SIZE=134217728/' .config

      - name: Set LAN IP
        run: |
          cd /opt/rt-n56u/trunk
          echo "CONFIG_LAN_IP=\"192.168.123.1\"" >> .config
          echo "CONFIG_LAN_NETMASK=\"255.255.255.0\"" >> .config

      - name: Build firmware
        run: |
          cd /opt/rt-n56u/trunk
          ./clear_tree
          fakeroot ./build_firmware_modify NETGEAR-BZV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R6800-firmware
          path: /opt/rt-n56u/trunk/images/*.trx
